name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Cancela runs anteriores del mismo PR cuando se empuja un nuevo commit.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate course packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar PyYAML
        run: pip install pyyaml

      - name: Validar agent365-cert
        run: python3 scripts/validate-course.py agent365-cert

      - name: Validar demo-pv-learn
        run: python3 scripts/validate-course.py demo-pv-learn

  lint-and-typecheck:
    name: Lint + typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: platform/package-lock.json

      - run: npm ci

      - name: tsc
        run: npx tsc -b

      - name: ESLint
        run: npm run lint
        continue-on-error: true # ESLint todavía no es bloqueante; activar cuando se limpie

  unit-tests:
    name: Unit tests (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: platform/package-lock.json

      - run: npm ci

      - name: vitest
        run: npm run test:unit

      - name: smoke test del examen
        run: npm run test:exam

  e2e-tests:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: platform/package-lock.json

      - run: npm ci

      - name: Instalar browsers Playwright
        run: npm run test:e2e:install

      - name: Playwright
        run: npm run test:e2e

      - name: Subir trazas de fallos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: platform/playwright-report/
          retention-days: 14

  build-and-budget:
    name: Build + bundle-size budget
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: platform/package-lock.json

      - run: npm ci

      - name: Build (producción)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Bundle size budget
        run: node scripts/check-bundle-budget.mjs
