<svg viewBox="0 0 980 540" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <style>
      .title  { font-size: 22px; font-weight: 700; fill: #1c1917; }
      .sub    { font-size: 13px; font-style: italic; fill: #57534e; }
      .h2     { font-size: 13px; font-weight: 700; fill: white; letter-spacing: 0.04em; }
      .label  { font-size: 13px; font-weight: 600; fill: #1c1917; }
      .desc   { font-size: 11.5px; fill: #57534e; }
      .url    { font-size: 11px; font-family: ui-monospace, 'SF Mono', monospace; }
      .footer { font-size: 11px; fill: #a8a29e; }
      .date   { font-size: 12px; font-weight: 700; fill: white; }
    </style>
  </defs>

  <text x="40" y="38" class="title">Convergencia M365 admin center ↔ Entra · 1 de mayo de 2026</text>
  <text x="40" y="58" class="sub">Páginas de Entra retiradas · APIs migradas a /beta/copilot/admin · ventana de retrocompatibilidad de 90 días</text>

  <!-- Timeline -->
  <line x1="80" y1="200" x2="900" y2="200" stroke="#D6D3D1" stroke-width="2"/>

  <!-- Hito 1: Antes 30 abril -->
  <rect x="80" y="170" width="14" height="60" fill="#A8A29E"/>
  <text x="87" y="155" text-anchor="middle" class="date" fill="#1c1917" font-size="11">Hasta 30 abr 2026</text>

  <rect x="100" y="240" width="280" height="240" rx="10" fill="#FAFAF9" stroke="#A8A29E" stroke-width="1.5"/>
  <rect x="100" y="240" width="280" height="32" rx="10" fill="#57534E"/>
  <rect x="100" y="264" width="280" height="8" fill="#57534E"/>
  <text x="120" y="261" class="h2">ANTES · DISTRIBUIDO</text>

  <text x="120" y="290" class="label">Páginas en Entra admin center</text>
  <text x="120" y="310" class="url" fill="#57534e">entra.microsoft.com</text>
  <text x="120" y="324" class="url" fill="#57534e">→ Identity → Agents → Registry</text>
  <text x="120" y="340" class="url" fill="#57534e">→ Identity → Agents → Collections</text>
  <text x="120" y="356" class="url" fill="#57534e">→ Identity → Agents → Overview</text>

  <text x="120" y="385" class="label">APIs legacy</text>
  <text x="120" y="404" class="url" fill="#57534e">GET /beta/agentRegistry/agents</text>
  <text x="120" y="420" class="url" fill="#57534e">GET /beta/agentRegistry/collections</text>
  <text x="120" y="436" class="url" fill="#57534e">POST /beta/agentRegistry/agents/...</text>

  <text x="120" y="465" class="desc" font-style="italic">Gestión repartida entre dos admin centers</text>

  <!-- Hito 2: 1 mayo 2026 -->
  <rect x="430" y="170" width="14" height="60" fill="#9A44E5"/>
  <text x="437" y="155" text-anchor="middle" class="date" fill="#7B2FBE" font-size="13">1 MAYO 2026</text>

  <rect x="450" y="240" width="220" height="240" rx="10" fill="#FAF5FF" stroke="#9A44E5" stroke-width="1.5"/>
  <rect x="450" y="240" width="220" height="32" rx="10" fill="#9A44E5"/>
  <rect x="450" y="264" width="220" height="8" fill="#9A44E5"/>
  <text x="470" y="261" class="h2">CONVERGENCIA · GA</text>

  <text x="470" y="290" class="label" fill="#9A3412">Retiradas</text>
  <text x="470" y="310" class="desc">Páginas legacy de Agents</text>
  <text x="470" y="326" class="desc">en Entra admin center</text>

  <text x="470" y="355" class="label" fill="#7B2FBE">Activado</text>
  <text x="470" y="375" class="desc">M365 admin center → Agents</text>
  <text x="470" y="391" class="desc">como punto único de gestión</text>

  <text x="470" y="420" class="label">Permanece en Entra</text>
  <text x="470" y="440" class="desc">Agent identities, blueprints,</text>
  <text x="470" y="456" class="desc">CA, Identity Protection</text>

  <!-- Hito 3: Despues 1 mayo / hasta 1 agosto -->
  <rect x="720" y="170" width="14" height="60" fill="#15803D"/>
  <text x="727" y="155" text-anchor="middle" class="date" fill="#15803D" font-size="11">Desde 1 ago 2026</text>

  <rect x="740" y="240" width="220" height="240" rx="10" fill="#F0FDF4" stroke="#15803D" stroke-width="1.5"/>
  <rect x="740" y="240" width="220" height="32" rx="10" fill="#15803D"/>
  <rect x="740" y="264" width="220" height="8" fill="#15803D"/>
  <text x="760" y="261" class="h2">APIS DEFINITIVAS</text>

  <text x="760" y="290" class="label">Endpoint nuevo</text>
  <text x="760" y="309" class="url" fill="#166534">GET /beta/copilot/admin/agents</text>

  <text x="760" y="336" class="label">Endpoint nuevo</text>
  <text x="760" y="355" class="url" fill="#166534">POST /beta/copilot/admin/agents/</text>
  <text x="760" y="369" class="url" fill="#166534">{id}/approve</text>

  <text x="760" y="396" class="label">Endpoint nuevo</text>
  <text x="760" y="415" class="url" fill="#166534">GET /beta/copilot/admin/agents/</text>
  <text x="760" y="429" class="url" fill="#166534">{id}/risks</text>

  <text x="760" y="461" class="desc" font-style="italic" fill="#9A3412">Legacy → 410 Gone</text>

  <text x="490" y="520" class="footer" text-anchor="middle">Plain Vanilla Solutions — Curso Microsoft Agent 365 IT Admin · Módulo 06 · Fig. 6.5</text>
</svg>
