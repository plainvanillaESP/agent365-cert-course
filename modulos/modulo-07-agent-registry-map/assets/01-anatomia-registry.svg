  <text x="278" y="190" class="row">RRHH-FAQ-Nóminas</text>
  <rect x="430" y="178" width="60" height="18" rx="9" fill="#FFF7ED"/>
  <text x="460" y="190" text-anchor="middle" class="pill" fill="#9A3412">3rd Party</text>
  <text x="510" y="190" class="row">Copilot Studio</text>
  <text x="610" y="190" class="row">Luis Ortega</text>
  <rect x="715" y="178" width="48" height="18" rx="9" fill="#F0FDF4"/>
  <text x="739" y="190" text-anchor="middle" class="pill" fill="#166534">Active</text>
  <text x="790" y="190" class="row">hace 2h</text>
  <rect x="887" y="178" width="44" height="18" rx="9" fill="#FFFBEB"/>
  <text x="909" y="190" text-anchor="middle" class="pill" fill="#854D0E">Medium</text>

  <!-- Fila 2 -->
  <rect x="260" y="206" width="680" height="36" fill="#FAFAF9"/>
  <text x="278" y="226" class="row">Foundry-Finanzas-01</text>
  <rect x="430" y="214" width="80" height="18" rx="9" fill="#FAF5FF"/>
  <text x="470" y="226" text-anchor="middle" class="pill" fill="#7B2FBE">Organization</text>
  <text x="510" y="226" class="row">Foundry</text>
  <text x="610" y="226" class="row">Pablo García</text>
  <rect x="715" y="214" width="48" height="18" rx="9" fill="#F0FDF4"/>
  <text x="739" y="226" text-anchor="middle" class="pill" fill="#166534">Active</text>
  <text x="790" y="226" class="row">hace 30 min</text>
  <rect x="887" y="214" width="44" height="18" rx="9" fill="#FEF2F2"/>
  <text x="909" y="226" text-anchor="middle" class="pill" fill="#B91C1C">High</text>

  <!-- Fila 3 -->
  <rect x="260" y="242" width="680" height="36" fill="white"/>
  <text x="278" y="262" class="row">Tienda-Ops-Iberia</text>
  <rect x="430" y="250" width="80" height="18" rx="9" fill="#FAF5FF"/>
  <text x="470" y="262" text-anchor="middle" class="pill" fill="#7B2FBE">Organization</text>
  <text x="510" y="262" class="row">Copilot Studio</text>
  <text x="610" y="262" class="row" font-style="italic" fill="#9A3412">— ownerless</text>
  <rect x="715" y="250" width="48" height="18" rx="9" fill="#F0FDF4"/>
  <text x="739" y="262" text-anchor="middle" class="pill" fill="#166534">Active</text>
  <text x="790" y="262" class="row">ayer</text>
  <rect x="887" y="250" width="44" height="18" rx="9" fill="#FEF2F2"/>
  <text x="909" y="262" text-anchor="middle" class="pill" fill="#B91C1C">High</text>

  <!-- Fila 4 -->
  <rect x="260" y="278" width="680" height="36" fill="#FAFAF9"/>
  <text x="278" y="298" class="row">Agent-Ventas-LATAM</text>
  <rect x="430" y="286" width="60" height="18" rx="9" fill="#FFF7ED"/>
  <text x="460" y="298" text-anchor="middle" class="pill" fill="#9A3412">3rd Party</text>
  <text x="510" y="298" class="row">Copilot Studio</text>
  <text x="610" y="298" class="row">Sara Vidal</text>
  <rect x="715" y="286" width="68" height="18" rx="9" fill="#FFFBEB"/>
  <text x="749" y="298" text-anchor="middle" class="pill" fill="#854D0E">Pending</text>
  <text x="790" y="298" class="row">—</text>
  <text x="909" y="298" text-anchor="middle" class="row" fill="#a8a29e">—</text>

  <!-- Fila 5 -->
  <rect x="260" y="314" width="680" height="36" fill="white"/>
  <text x="278" y="334" class="row">RRHH-Onboarding</text>
  <rect x="430" y="322" width="80" height="18" rx="9" fill="#FAF5FF"/>
  <text x="470" y="334" text-anchor="middle" class="pill" fill="#7B2FBE">Organization</text>
  <text x="510" y="334" class="row">Copilot Studio</text>
  <text x="610" y="334" class="row">Marta Núñez</text>
  <rect x="715" y="322" width="48" height="18" rx="9" fill="#F0FDF4"/>
  <text x="739" y="334" text-anchor="middle" class="pill" fill="#166534">Active</text>
  <text x="790" y="334" class="row">hace 5 min</text>
  <rect x="887" y="322" width="44" height="18" rx="9" fill="#FFFBEB"/>
  <text x="909" y="334" text-anchor="middle" class="pill" fill="#854D0E">Medium</text>

  <!-- Resto -->
  <text x="600" y="400" text-anchor="middle" class="row" fill="#a8a29e" font-style="italic">... 84 agentes más coinciden con los filtros activos</text>

  <!-- Vista de detalle (panel inferior derecho) -->
  <rect x="260" y="430" width="680" height="90" rx="6" fill="#FAFAF9" stroke="#D6D3D1"/>
  <text x="278" y="453" class="label">Click en una fila → Vista de detalle</text>
  <text x="278" y="473" class="desc">Identidad y propietario · Plataforma y configuración · Permisos · Risk panel (E7)</text>
  <text x="278" y="491" class="desc">Actividad últimos 30 días · Capabilities (datasources, plugins, canales)</text>
  <text x="278" y="509" class="desc" font-style="italic">Las acciones del panel de detalle se cubren en M07.6 · M08 · M12</text>

  <text x="490" y="568" class="footer" text-anchor="middle">Plain Vanilla Solutions — Curso Microsoft Agent 365 IT Admin · Módulo 07 · Fig. 7.1</text>
</svg>
