  <rect x="40" y="100" width="200" height="32" rx="10" fill="#7B2FBE"/>
  <rect x="40" y="124" width="200" height="8" fill="#7B2FBE"/>
  <text x="60" y="121" class="h2">FILTROS</text>

  <text x="60" y="155" class="label">Publisher</text>
  <text x="60" y="172" class="desc">☐ Microsoft</text>
  <text x="60" y="186" class="desc">☑ Third Party</text>
  <text x="60" y="200" class="desc">☐ Organization</text>

  <text x="60" y="226" class="label">Platform</text>
  <text x="60" y="243" class="desc">☑ Copilot Studio</text>
  <text x="60" y="257" class="desc">☐ Foundry</text>
  <text x="60" y="271" class="desc">☐ Bedrock (preview)</text>
  <text x="60" y="285" class="desc">☐ Gemini (preview)</text>

  <text x="60" y="311" class="label">Status</text>
  <text x="60" y="328" class="desc">☑ Active</text>
  <text x="60" y="342" class="desc">☐ Pending approval</text>
  <text x="60" y="356" class="desc">☐ Disabled</text>

  <text x="60" y="382" class="label">Risk · E7</text>
  <text x="60" y="399" class="desc">☐ Low</text>
  <text x="60" y="413" class="desc">☑ Medium</text>
  <text x="60" y="427" class="desc">☑ High</text>
  <text x="60" y="441" class="desc">☑ Critical</text>

  <text x="60" y="467" class="label">Date</text>
  <text x="60" y="484" class="desc">Created last 30d</text>

  <!-- Botón Export -->
  <rect x="60" y="500" width="160" height="22" rx="4" fill="#9A44E5"/>
  <text x="140" y="514" text-anchor="middle" font-size="10.5" fill="white" font-weight="600">⬇ EXPORT TO EXCEL</text>

  <!-- ===== Tabla del Registry (derecha) ===== -->
  <rect x="260" y="100" width="680" height="430" rx="10" fill="white" stroke="#9A44E5" stroke-width="1.5"/>
  <rect x="260" y="100" width="680" height="32" rx="10" fill="#9A44E5"/>
  <rect x="260" y="124" width="680" height="8" fill="#9A44E5"/>
  <text x="280" y="121" class="h2">AGENT REGISTRY · 247 AGENTES · FILTROS APLICADOS: 89</text>

  <!-- Header de columnas -->
  <rect x="260" y="140" width="680" height="28" fill="#FAF5FF"/>
  <text x="278" y="158" class="col">Display name</text>
  <text x="430" y="158" class="col">Publisher</text>
  <text x="510" y="158" class="col">Platform</text>
  <text x="610" y="158" class="col">Owner</text>
  <text x="720" y="158" class="col">Status</text>
  <text x="790" y="158" class="col">Last activity</text>
  <text x="892" y="158" class="col">Risks</text>

