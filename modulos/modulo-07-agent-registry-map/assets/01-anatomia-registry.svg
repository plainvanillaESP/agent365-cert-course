<svg viewBox="0 0 980 580" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <style>
      .title  { font-size: 22px; font-weight: 700; fill: #1c1917; }
      .sub    { font-size: 13px; font-style: italic; fill: #57534e; }
      .h2     { font-size: 12.5px; font-weight: 700; fill: white; letter-spacing: 0.04em; }
      .col    { font-size: 11px; fill: #1c1917; font-weight: 600; }
      .desc   { font-size: 10.5px; fill: #57534e; }
      .row    { font-size: 11px; fill: #44403c; }
      .footer { font-size: 11px; fill: #a8a29e; }
      .pill   { font-size: 9.5px; font-weight: 600; }
      .label  { font-size: 11px; font-weight: 600; fill: #1c1917; }
    </style>
  </defs>

  <text x="40" y="38" class="title">Anatomía del Agent Registry</text>
  <text x="40" y="58" class="sub">Tabla maestra del Agent workload · filtros laterales · exportación a Excel · vista de detalle</text>

  <!-- ===== Filtros laterales (izquierda) ===== -->
