<svg viewBox="0 0 980 580" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <style>
      .title  { font-size: 22px; font-weight: 700; fill: #1c1917; }
      .sub    { font-size: 13px; font-style: italic; fill: #57534e; }
      .h2     { font-size: 12.5px; font-weight: 700; fill: white; letter-spacing: 0.04em; }
      .cluster-label { font-size: 12px; font-weight: 700; }
      .agent  { font-size: 9.5px; font-weight: 600; fill: white; }
      .desc   { font-size: 10.5px; fill: #57534e; }
      .legend { font-size: 11px; fill: #1c1917; }
      .footer { font-size: 11px; fill: #a8a29e; }
    </style>
    <marker id="arr-conn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7B2FBE"/>
    </marker>
  </defs>

  <text x="40" y="38" class="title">Agent Map · clusters por plataforma y conexiones agent-to-agent</text>
  <text x="40" y="58" class="sub">Mismo inventario que Registry · formato grafo · útil para detectar agentes huérfanos, hubs y multi-agent workflows</text>

  <!-- Fondo del mapa -->
  <rect x="40" y="80" width="900" height="430" rx="10" fill="#FAFAF9" stroke="#D6D3D1"/>

  <!-- ===== Cluster 1: Copilot Studio (purple) ===== -->
  <ellipse cx="200" cy="220" rx="135" ry="115" fill="#FAF5FF" stroke="#9A44E5" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="200" y="98" text-anchor="middle" class="cluster-label" fill="#7B2FBE">Copilot Studio · 12 agentes</text>

  <!-- Agent nodes -->
  <circle cx="160" cy="175" r="22" fill="#9A44E5"/>
  <text x="160" y="171" text-anchor="middle" class="agent" font-size="8.5">RRHH</text>
  <text x="160" y="183" text-anchor="middle" class="agent" font-size="8.5">FAQ</text>

  <circle cx="240" cy="175" r="22" fill="#9A44E5"/>
  <text x="240" y="171" text-anchor="middle" class="agent" font-size="8.5">Onboard</text>

  <circle cx="155" cy="245" r="22" fill="#9A44E5"/>
  <text x="155" y="241" text-anchor="middle" class="agent" font-size="8.5">Tienda</text>
  <text x="155" y="253" text-anchor="middle" class="agent" font-size="8.5">Iberia</text>

  <circle cx="230" cy="255" r="22" fill="#9A44E5"/>
  <text x="230" y="251" text-anchor="middle" class="agent" font-size="8.5">Tienda</text>
  <text x="230" y="263" text-anchor="middle" class="agent" font-size="8.5">Italia</text>

  <circle cx="195" cy="305" r="20" fill="#9A44E5" opacity="0.7"/>
  <text x="195" y="309" text-anchor="middle" class="agent" font-size="8">+ 8 más</text>

  <!-- ===== Cluster 2: Foundry (blue) ===== -->
  <ellipse cx="540" cy="220" rx="120" ry="100" fill="#EFF6FF" stroke="#0284C7" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="540" y="113" text-anchor="middle" class="cluster-label" fill="#0284C7">Azure AI Foundry · 5 agentes</text>

  <!-- Hub agent -->
  <circle cx="540" cy="220" r="30" fill="#0284C7" stroke="#0369A1" stroke-width="3"/>
  <text x="540" y="216" text-anchor="middle" class="agent" font-size="9">Foundry</text>
  <text x="540" y="227" text-anchor="middle" class="agent" font-size="9">Finanzas</text>
  <text x="540" y="238" text-anchor="middle" class="agent" font-size="8">HUB</text>

  <circle cx="475" cy="180" r="20" fill="#0284C7"/>
  <text x="475" y="183" text-anchor="middle" class="agent" font-size="8.5">Reportes</text>

  <circle cx="605" cy="180" r="20" fill="#0284C7"/>
  <text x="605" y="183" text-anchor="middle" class="agent" font-size="8.5">Análisis</text>

  <circle cx="475" cy="270" r="20" fill="#0284C7"/>
  <text x="475" y="273" text-anchor="middle" class="agent" font-size="8.5">Forecast</text>

  <circle cx="605" cy="270" r="20" fill="#0284C7"/>
  <text x="605" y="273" text-anchor="middle" class="agent" font-size="8.5">Audit</text>

  <!-- Conexiones agent-to-agent dentro del cluster Foundry (hub pattern) -->
  <line x1="495" y1="195" x2="515" y2="208" stroke="#7B2FBE" stroke-width="1.5" marker-end="url(#arr-conn)"/>
  <line x1="585" y1="195" x2="565" y2="208" stroke="#7B2FBE" stroke-width="1.5" marker-end="url(#arr-conn)"/>
  <line x1="495" y1="255" x2="515" y2="234" stroke="#7B2FBE" stroke-width="1.5" marker-end="url(#arr-conn)"/>
  <line x1="585" y1="255" x2="565" y2="234" stroke="#7B2FBE" stroke-width="1.5" marker-end="url(#arr-conn)"/>

  <!-- ===== Cluster 3: M365 Copilot (gray) ===== -->
  <ellipse cx="820" cy="170" rx="90" ry="60" fill="#FAFAF9" stroke="#57534E" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="820" y="103" text-anchor="middle" class="cluster-label" fill="#57534E">M365 Copilot · 3 built-in</text>

  <circle cx="790" cy="165" r="18" fill="#57534E"/>
  <text x="790" y="168" text-anchor="middle" class="agent" font-size="8">Sales</text>

  <circle cx="850" cy="165" r="18" fill="#57534E"/>
  <text x="850" y="168" text-anchor="middle" class="agent" font-size="8">SDD</text>

  <circle cx="820" cy="200" r="18" fill="#57534E"/>
  <text x="820" y="203" text-anchor="middle" class="agent" font-size="8">Service</text>

  <!-- ===== Cluster 4: External (orange, preview) ===== -->
  <ellipse cx="800" cy="370" rx="120" ry="80" fill="#FFF7ED" stroke="#C2410C" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="800" y="280" text-anchor="middle" class="cluster-label" fill="#C2410C">External · Preview · Registry sync</text>

  <circle cx="745" cy="365" r="20" fill="#C2410C"/>
  <text x="745" y="362" text-anchor="middle" class="agent" font-size="8">Bedrock</text>
  <text x="745" y="372" text-anchor="middle" class="agent" font-size="8">Sales-AI</text>

  <circle cx="855" cy="365" r="20" fill="#C2410C"/>
  <text x="855" y="362" text-anchor="middle" class="agent" font-size="8">Gemini</text>
  <text x="855" y="372" text-anchor="middle" class="agent" font-size="8">Insights</text>

  <circle cx="800" cy="415" r="18" fill="#C2410C" opacity="0.7"/>
  <text x="800" y="419" text-anchor="middle" class="agent" font-size="7.5">+ 4 más</text>

  <!-- ===== Conexión cross-cluster (multi-agent workflow) ===== -->
  <line x1="280" y1="220" x2="425" y2="220" stroke="#7B2FBE" stroke-width="2" stroke-dasharray="3 2" marker-end="url(#arr-conn)"/>
  <text x="350" y="212" text-anchor="middle" class="desc" fill="#7B2FBE" font-weight="600">cross-cluster</text>

  <!-- ===== Leyenda ===== -->
  <rect x="40" y="525" width="900" height="35" rx="6" fill="white" stroke="#D6D3D1"/>
  <circle cx="62" cy="542" r="6" fill="#0284C7" stroke="#0369A1" stroke-width="2"/>
  <text x="76" y="546" class="legend">Hub agent (varias conexiones)</text>
  <line x1="270" y1="542" x2="305" y2="542" stroke="#7B2FBE" stroke-width="2" marker-end="url(#arr-conn)"/>
  <text x="312" y="546" class="legend">Conexión A → B (multi-agent workflow)</text>
  <text x="610" y="546" class="legend">Cluster con borde discontinuo = Preview</text>

  <text x="490" y="575" class="footer" text-anchor="middle">Plain Vanilla Solutions — Curso Microsoft Agent 365 IT Admin · Módulo 07 · Fig. 7.2</text>
</svg>
