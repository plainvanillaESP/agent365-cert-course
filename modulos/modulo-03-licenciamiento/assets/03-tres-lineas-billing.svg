<svg viewBox="0 0 980 540" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <style>
      .title  { font-size: 22px; font-weight: 700; fill: #1c1917; }
      .sub    { font-size: 13px; font-style: italic; fill: #57534e; }
      .h2     { font-size: 15px; font-weight: 600; }
      .label  { font-size: 12px; fill: #44403c; }
      .lbl-sm { font-size: 11px; fill: #78716c; }
      .lbl-mono { font-size: 11px; font-family: ui-monospace, "SF Mono", monospace; fill: #57534e; }
      .price  { font-size: 18px; font-weight: 700; }
      .small  { font-size: 11.5px; fill: #44403c; }
      .footer { font-size: 11px; fill: #a8a29e; }
    </style>
  </defs>

  <text x="40" y="38" class="title">Las tres líneas de billing simultáneas</text>
  <text x="40" y="58" class="sub">Una factura de un agente puede tener hasta cuatro líneas; las tres centrales son las críticas</text>

  <!-- Agente central -->
  <rect x="380" y="100" width="220" height="80" rx="10" fill="#FAF5FF" stroke="#7B2FBE" stroke-width="2"/>
  <text x="490" y="128" text-anchor="middle" class="h2" fill="#1c1917">Un agente cualquiera</text>
  <text x="490" y="148" text-anchor="middle" class="label">DA · Foundry · SharePoint…</text>
  <text x="490" y="166" text-anchor="middle" class="lbl-sm">consume las tres líneas a la vez</text>

  <!-- ===== Línea 1: Agent 365 (izquierda) ===== -->
  <rect x="40" y="220" width="280" height="180" rx="10" fill="white" stroke="#9A44E5" stroke-width="2"/>
  <rect x="40" y="220" width="280" height="36" rx="10" fill="#9A44E5"/>
  <rect x="40" y="246" width="280" height="10" fill="#9A44E5"/>
  <text x="58" y="245" fill="white" class="h2">1. Agent 365 · per-seat</text>

  <text x="58" y="285" class="price" fill="#1c1917">$15</text>
  <text x="100" y="285" class="lbl-sm">USD/usuario/mes</text>

  <text x="58" y="312" class="small" font-weight="600">Qué se paga:</text>
  <text x="58" y="328" class="small">acceso al control plane</text>
  <text x="58" y="343" class="small">y al usuario que invoca</text>

  <text x="58" y="370" class="small" font-weight="600">Donde se ve:</text>
  <text x="58" y="386" class="lbl-mono">M365 admin → Billing</text>

  <!-- Línea conectora -->
  <line x1="380" y1="160" x2="320" y2="280" stroke="#9A44E5" stroke-width="2"/>

  <!-- ===== Línea 2: Copilot Credits (centro) ===== -->
  <rect x="350" y="220" width="280" height="180" rx="10" fill="white" stroke="#0284C7" stroke-width="2"/>
  <rect x="350" y="220" width="280" height="36" rx="10" fill="#0284C7"/>
  <rect x="350" y="246" width="280" height="10" fill="#0284C7"/>
  <text x="368" y="245" fill="white" class="h2">2. Copilot Studio Credits</text>

  <text x="368" y="285" class="price" fill="#1c1917">$200</text>
  <text x="425" y="285" class="lbl-sm">/ pack 25.000 créditos</text>

  <text x="368" y="312" class="small" font-weight="600">Qué se paga:</text>
  <text x="368" y="328" class="small">ejecución de DA, CEA, BP</text>
  <text x="368" y="343" class="small">1-5 créditos por mensaje</text>

  <text x="368" y="370" class="small" font-weight="600">Donde se ve:</text>
  <text x="368" y="386" class="lbl-mono">Copilot Studio → Capacity</text>

  <!-- Línea conectora -->
  <line x1="490" y1="180" x2="490" y2="219" stroke="#0284C7" stroke-width="2"/>

  <!-- ===== Línea 3: Foundry per-token (derecha) ===== -->
  <rect x="660" y="220" width="280" height="180" rx="10" fill="white" stroke="#0E7490" stroke-width="2"/>
  <rect x="660" y="220" width="280" height="36" rx="10" fill="#0E7490"/>
  <rect x="660" y="246" width="280" height="10" fill="#0E7490"/>
  <text x="678" y="245" fill="white" class="h2">3. Foundry · per-token</text>

  <text x="678" y="285" class="price" fill="#1c1917">$ var.</text>
  <text x="740" y="285" class="lbl-sm">según modelo</text>

  <text x="678" y="312" class="small" font-weight="600">Qué se paga:</text>
  <text x="678" y="328" class="small">tokens del modelo subyacente</text>
  <text x="678" y="343" class="small">GPT-4o, Phi, etc.</text>

  <text x="678" y="370" class="small" font-weight="600">Donde se ve:</text>
  <text x="678" y="386" class="lbl-mono">Azure AI Foundry → Cost</text>

  <!-- Línea conectora -->
  <line x1="600" y1="160" x2="660" y2="280" stroke="#0E7490" stroke-width="2"/>

  <!-- ===== Banda inferior con regla del Pre-Purchase Plan ===== -->
  <rect x="40" y="430" width="900" height="64" rx="8" fill="#F5F5F4" stroke="#D6D3D1" stroke-width="1"/>
  <text x="60" y="455" class="label" font-weight="600">Cuando el consumo crece</text>
  <text x="245" y="455" class="label">→</text>
  <text x="270" y="455" class="label" font-weight="600" fill="#7B2FBE">Pre-Purchase Plan P3 con CCCU</text>
  <text x="60" y="478" class="lbl-sm">Compra anual con descuento por volumen, reparte entre Copilot Studio y Foundry según consumo real.</text>

  <!-- Footer -->
  <text x="490" y="525" class="footer" text-anchor="middle">Plain Vanilla Solutions — Curso Microsoft Agent 365 IT Admin · Módulo 03 · Fig. 3.3</text>
</svg>
