<svg viewBox="0 0 980 540" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <style>
      .title  { font-size: 22px; font-weight: 700; fill: #1c1917; }
      .sub    { font-size: 13px; font-style: italic; fill: #57534e; }
      .h2     { font-size: 13px; font-weight: 700; fill: white; letter-spacing: 0.04em; }
      .step-h { font-size: 12.5px; font-weight: 700; fill: #1c1917; }
      .desc   { font-size: 11px; fill: #57534e; }
      .item   { font-size: 11px; fill: #44403c; }
      .footer { font-size: 11px; fill: #a8a29e; }
      .num    { font-size: 14px; font-weight: 700; fill: white; }
    </style>
    <marker id="arr-flow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7B2FBE"/>
    </marker>
  </defs>

  <text x="40" y="38" class="title">Report-only mode · sandbox para CA policies</text>
  <text x="40" y="58" class="sub">La policy se evalúa pero no se aplica · los logs se generan · esencial antes de enforcement</text>

  <!-- ===== Estado 1: Report-only (izquierda) ===== -->
  <rect x="40" y="90" width="430" height="380" rx="12" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <rect x="40" y="90" width="430" height="38" rx="12" fill="#F59E0B"/>
  <rect x="40" y="116" width="430" height="12" fill="#F59E0B"/>
  <text x="60" y="115" class="h2">REPORT-ONLY · DURANTE 7-14 DÍAS</text>

  <!-- Sub-flow de Report-only -->
  <circle cx="80" cy="170" r="16" fill="#F59E0B"/>
  <text x="80" y="175" text-anchor="middle" class="num">1</text>
  <text x="105" y="167" class="step-h">Sign-in del agente</text>
  <text x="105" y="183" class="desc">El agente solicita un token</text>

  <line x1="80" y1="190" x2="80" y2="215" stroke="#F59E0B" stroke-width="2" marker-end="url(#arr-flow)"/>

  <circle cx="80" cy="225" r="16" fill="#F59E0B"/>
  <text x="80" y="230" text-anchor="middle" class="num">2</text>
  <text x="105" y="222" class="step-h">Policy evaluada</text>
  <text x="105" y="238" class="desc">CA evalúa scope, target, conditions</text>

  <line x1="80" y1="245" x2="80" y2="270" stroke="#F59E0B" stroke-width="2" marker-end="url(#arr-flow)"/>

  <circle cx="80" cy="280" r="16" fill="#F59E0B"/>
  <text x="80" y="285" text-anchor="middle" class="num">3</text>
  <text x="105" y="277" class="step-h">Resultado registrado en logs</text>
  <text x="105" y="293" class="desc">«Reported: would have been blocked»</text>

  <line x1="80" y1="300" x2="80" y2="325" stroke="#F59E0B" stroke-width="2" marker-end="url(#arr-flow)"/>

  <circle cx="80" cy="335" r="16" fill="#15803D"/>
  <text x="80" y="340" text-anchor="middle" class="num">4</text>
  <text x="105" y="332" class="step-h" fill="#166534">Sign-in continúa normal</text>
  <text x="105" y="348" class="desc" fill="#166534">Token concedido · agente opera</text>

  <rect x="60" y="370" width="390" height="86" rx="6" fill="white" stroke="#F59E0B"/>
  <text x="80" y="392" class="step-h">Cómo monitorizar</text>
  <text x="80" y="411" class="item">Sign-in logs → filter Applied CA policies → seleccionar policy</text>
  <text x="80" y="427" class="item">Result: «Reported: would be blocked» / «would require MFA»</text>
  <text x="80" y="443" class="item" font-style="italic">Revisar diariamente los primeros 7 días</text>

  <!-- Flecha entre estados -->
  <line x1="478" y1="280" x2="540" y2="280" stroke="#7B2FBE" stroke-width="3" marker-end="url(#arr-flow)"/>
  <text x="509" y="270" text-anchor="middle" font-size="11" fill="#7B2FBE" font-weight="600">Tras 14 días</text>
  <text x="509" y="295" text-anchor="middle" font-size="11" fill="#7B2FBE" font-weight="600">sin sorpresas</text>

  <!-- ===== Estado 2: Enabled (derecha) ===== -->
  <rect x="550" y="90" width="390" height="380" rx="12" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
  <rect x="550" y="90" width="390" height="38" rx="12" fill="#DC2626"/>
  <rect x="550" y="116" width="390" height="12" fill="#DC2626"/>
  <text x="570" y="115" class="h2">ENABLED · ENFORCEMENT ACTIVO</text>

  <circle cx="590" cy="170" r="16" fill="#DC2626"/>
  <text x="590" y="175" text-anchor="middle" class="num">1</text>
  <text x="615" y="167" class="step-h">Sign-in del agente</text>
  <text x="615" y="183" class="desc">El agente solicita un token</text>

  <line x1="590" y1="190" x2="590" y2="215" stroke="#DC2626" stroke-width="2" marker-end="url(#arr-flow)"/>

  <circle cx="590" cy="225" r="16" fill="#DC2626"/>
  <text x="590" y="230" text-anchor="middle" class="num">2</text>
  <text x="615" y="222" class="step-h">Policy evaluada</text>
  <text x="615" y="238" class="desc">CA evalúa todas las condiciones</text>

  <line x1="590" y1="245" x2="590" y2="270" stroke="#DC2626" stroke-width="2" marker-end="url(#arr-flow)"/>

  <circle cx="590" cy="280" r="16" fill="#DC2626"/>
  <text x="590" y="285" text-anchor="middle" class="num">3</text>
  <text x="615" y="277" class="step-h" fill="#B91C1C">Grant aplicado · BLOCK</text>
  <text x="615" y="293" class="desc" fill="#B91C1C">Token NO concedido · agente bloqueado</text>

  <rect x="570" y="320" width="350" height="135" rx="6" fill="white" stroke="#DC2626"/>
  <text x="590" y="342" class="step-h">⚠ Antipatrones</text>
  <text x="590" y="362" class="item">Skip Report-only para policies «obvias»</text>
  <text x="590" y="378" class="desc" font-style="italic">Un cambio en el modelo puede generar falsos positivos</text>
  <text x="590" y="402" class="item">Olvidar la policy en Report-only 30+ días</text>
  <text x="590" y="418" class="desc" font-style="italic">Documentar fecha y review programada</text>
  <text x="590" y="442" class="item" font-weight="600" fill="#B91C1C">Siempre Report-only primero · sin excepciones</text>

  <text x="490" y="525" class="footer" text-anchor="middle">Plain Vanilla Solutions — Curso Microsoft Agent 365 IT Admin · Módulo 09 · Fig. 9.3</text>
</svg>
