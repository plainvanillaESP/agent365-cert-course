<svg viewBox="0 0 980 540" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <style>
      .title  { font-size: 22px; font-weight: 700; fill: #1c1917; }
      .sub    { font-size: 13px; font-style: italic; fill: #57534e; }
      .h2     { font-size: 14px; font-weight: 600; fill: white; }
      .label  { font-size: 12px; fill: #44403c; }
      .desc   { font-size: 11px; fill: #57534e; }
      .check  { font-size: 11.5px; fill: #15803D; font-weight: 600; }
      .where  { font-size: 10.5px; font-family: ui-monospace, 'SF Mono', monospace; fill: #7B2FBE; }
      .footer { font-size: 11px; fill: #a8a29e; }
    </style>
    <marker id="arr-flow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7B2FBE"/>
    </marker>
  </defs>

  <text x="40" y="38" class="title">Validación end-to-end del setup</text>
  <text x="40" y="58" class="sub">Un agente trivial debe aparecer en los tres admin centers en menos de 30 minutos</text>

  <!-- ===== Origen: Agent Builder ===== -->
  <rect x="40" y="100" width="220" height="150" rx="10" fill="#FAF5FF" stroke="#7B2FBE" stroke-width="2"/>
  <rect x="40" y="100" width="220" height="34" rx="10" fill="#7B2FBE"/>
  <rect x="40" y="124" width="220" height="10" fill="#7B2FBE"/>
  <text x="60" y="122" class="h2">AGENT BUILDER</text>

  <text x="60" y="158" class="label" font-weight="600">Crear:</text>
  <text x="60" y="176" class="label">Test Agent 365 Setup</text>
  <text x="60" y="194" class="desc">Sin datasource. Publicar al tenant.</text>

  <text x="60" y="220" class="label" font-weight="600">Interactuar:</text>
  <text x="60" y="238" class="desc">Hacer 1 pregunta para generar evento.</text>

  <!-- Flechas hacia los 3 admin centers -->
  <line x1="265" y1="175" x2="350" y2="140" stroke="#7B2FBE" stroke-width="2" marker-end="url(#arr-flow)"/>
  <line x1="265" y1="175" x2="350" y2="290" stroke="#7B2FBE" stroke-width="2" marker-end="url(#arr-flow)"/>
  <line x1="265" y1="175" x2="350" y2="440" stroke="#7B2FBE" stroke-width="2" marker-end="url(#arr-flow)"/>

  <!-- ===== Verificación 1: M365 admin center ===== -->
  <rect x="360" y="80" width="580" height="120" rx="10" fill="white" stroke="#9A44E5" stroke-width="1.5"/>
  <rect x="360" y="80" width="180" height="34" rx="10" fill="#9A44E5"/>
  <rect x="360" y="104" width="180" height="10" fill="#9A44E5"/>
  <text x="380" y="102" class="h2">1 · M365 ADMIN</text>

  <text x="555" y="105" class="where">admin.microsoft.com → Agents → Registry</text>

  <text x="380" y="142" class="label" font-weight="600">Verificar:</text>
  <text x="380" y="160" class="desc">El agente aparece con estado Active · Owner = tu cuenta · Last activity reciente</text>
  <text x="380" y="184" class="check">✓ Confirma que el Registry recibe el evento</text>

  <!-- ===== Verificación 2: Defender XDR ===== -->
  <rect x="360" y="230" width="580" height="120" rx="10" fill="white" stroke="#DC2626" stroke-width="1.5"/>
  <rect x="360" y="230" width="180" height="34" rx="10" fill="#DC2626"/>
  <rect x="360" y="254" width="180" height="10" fill="#DC2626"/>
  <text x="380" y="252" class="h2">2 · DEFENDER XDR</text>

  <text x="555" y="255" class="where">security.microsoft.com → Hunting</text>

  <text x="380" y="292" class="label" font-weight="600">KQL:</text>
  <text x="380" y="310" class="where" fill="#1c1917">CloudAppEvents | where ActionType startswith &quot;Agent&quot; | take 10</text>
  <text x="380" y="334" class="check">✓ Confirma que el conector M365 está bien configurado</text>

  <!-- ===== Verificación 3: Purview ===== -->
  <rect x="360" y="380" width="580" height="120" rx="10" fill="white" stroke="#15803D" stroke-width="1.5"/>
  <rect x="360" y="380" width="180" height="34" rx="10" fill="#15803D"/>
  <rect x="360" y="404" width="180" height="10" fill="#15803D"/>
  <text x="380" y="402" class="h2">3 · PURVIEW</text>

  <text x="555" y="405" class="where">purview.microsoft.com → Activity explorer</text>

  <text x="380" y="442" class="label" font-weight="600">Verificar:</text>
  <text x="380" y="460" class="desc">Filtrar Activity = AI prompt o AI response · debe haber al menos 1 evento</text>
  <text x="380" y="484" class="check">✓ Confirma que DSPM y AI observability están activos</text>

  <text x="490" y="525" class="footer" text-anchor="middle">Plain Vanilla Solutions — Curso Microsoft Agent 365 IT Admin · Módulo 05 · Fig. 5.3</text>
</svg>
