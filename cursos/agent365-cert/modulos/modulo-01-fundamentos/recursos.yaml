# Recursos editoriales del módulo.
#
# Formato consumido por `platform/src/lib/resources.ts` a través de
# `loadResourcesGlob()` (course-paths.ts). Solo los módulos que tienen
# este archivo presentan la sección "Recursos" activa; el resto cae al
# fallback markdown.
#
# Estructura:
#
#   moduleId: número del módulo.
#   intro: párrafo introductorio (markdown plano permitido).
#   externalNote: disclaimer opcional para fuentes externas.
#   categories: lista de bloques. Cada bloque:
#     id, title, description (opcional), resources (lista).
#   resources: cada recurso lleva type, title, url, description,
#     date (solo blogs), lang ('es' | 'en').
#   crossReferences: enlaces a otros módulos del curso. Cada uno:
#     topic, moduleId, moduleTitle.

moduleId: 1
intro: >-
  Enlaces oficiales para profundizar en los temas tratados en el módulo. Las URLs apuntan a páginas
  activas en mayo de 2026; si Microsoft mueve algún contenido, validar en el changelog del módulo.
externalNote: >-
  Las fuentes externas no son oficiales de Microsoft. Se incluyen porque aportan perspectiva de
  mercado o contexto técnico relevante. Validar siempre con documentación oficial antes de aplicar
  en producción.
