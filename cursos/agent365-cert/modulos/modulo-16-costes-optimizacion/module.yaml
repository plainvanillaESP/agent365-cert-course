objetivos_aprendizaje:
  - id: OA-16.1
    texto: "Construir el modelo de coste total de propiedad (TCO) de un programa Agent 365 separando las cuatro líneas canónicas: licencias, ingestión de telemetría, almacenamiento de audit y operación interna."
    bloom: Aplicar
  - id: OA-16.2
    texto: "Optimizar la asignación de licencias Copilot 365 reasignando inactivos detectados en CCS Usage analytics con la regla de cuarentena 30/30 antes de retirar la licencia."
    bloom: Aplicar
  - id: OA-16.3
    texto: "Optimizar el catálogo de agentes aplicando el criterio de retirada por uso (agentes con menos de 5 invocaciones mensuales en dos trimestres consecutivos)."
    bloom: Aplicar
  - id: OA-16.4
    texto: "Optimizar el coste de ingestión y retención de audit aplicando tiering CloudAppEvents en Defender XDR (30 días caliente) y archive a Sentinel LTR (hasta 12 años) sin sacrificar la trazabilidad regulatoria."
    bloom: Analizar
  - id: OA-16.5
    texto: "Operar el ciclo de mejora continua trimestral del programa Agent 365 con cuatro inputs canónicos: KPIs financieros, lecciones aprendidas de incidents, evolución del catálogo y feedback de adopción."
    bloom: Aplicar
glosario:
  - termino: "TCO (Total Cost of Ownership)"
    definicion: "Coste agregado del programa Agent 365 sumando las cuatro líneas canónicas: licencias, ingestión, storage y operación interna."
  - termino: "Coste marginal de invocación"
    definicion: "Coste adicional por una invocación extra de agente. Suma licencia prorrateada, coste de ingestión del evento y coste de almacenamiento."
  - termino: "Licencia infrautilizada"
    definicion: "Licencia Copilot 365 asignada a un usuario con menos de 5 invocaciones de agente en los últimos 30 días según CCS Usage analytics."
  - termino: "Regla de cuarentena 30/30"
    definicion: "Procedimiento canónico de reasignación: 30 días de aviso al usuario y 30 días de monitorización antes de retirar la licencia definitivamente."
  - termino: "Agente zombi"
    definicion: "Agente desplegado en el catálogo con menos de 5 invocaciones mensuales durante dos trimestres consecutivos. Candidato a retirada."
  - termino: "Tiering de audit"
    definicion: "Estrategia de retención por capas: caliente en Defender XDR (30 días), frío en Sentinel LTR (hasta 12 años), opcional archivo externo blob."
  - termino: "Coste de ingestión"
    definicion: "Coste de absorber telemetría en el SIEM. En Sentinel se factura por GB ingerido. Para Agent 365 incluye CloudAppEvents y custom logs."
  - termino: "Coste de retención"
    definicion: "Coste mensual de mantener datos disponibles para consulta. En Sentinel cubre tier interactivo, archive y backup."
  - termino: "Capacidad reservada vs pay-as-you-go"
    definicion: "Dos modelos de compra para Sentinel y servicios Azure relacionados. La capacidad reservada da descuento (15-65%) a cambio de compromiso anual o trianual."
  - termino: "Comité de mejora continua"
    definicion: "Reunión trimestral del responsable de gobernanza de IA con finanzas, SOC y adopción para revisar TCO, retirar agentes zombi y planificar el siguiente trimestre."
  - termino: "Ratio de productividad por licencia"
    definicion: "KPI financiero canónico: horas estimadas ahorradas al mes dividido por coste mensual de la licencia. Útil para reportar al CFO."
  - termino: "Punto de break-even del agente"
    definicion: "Volumen mínimo de invocaciones mensuales que justifica el coste de desarrollo y mantenimiento del agente custom."
