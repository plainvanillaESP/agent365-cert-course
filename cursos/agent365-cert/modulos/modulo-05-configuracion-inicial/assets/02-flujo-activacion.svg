<svg viewBox="0 0 980 540" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <style>
      .title  { font-size: 22px; font-weight: 700; fill: #1c1917; }
      .sub    { font-size: 13px; font-style: italic; fill: #57534e; }
      .step-num { font-size: 24px; font-weight: 700; fill: white; }
      .step-h  { font-size: 15px; font-weight: 700; fill: #1c1917; }
      .step-w  { font-size: 11px; fill: #78716c; font-style: italic; }
      .label   { font-size: 12px; fill: #44403c; }
      .where   { font-size: 11px; font-family: ui-monospace, 'SF Mono', monospace; fill: #7B2FBE; }
      .check   { font-size: 11.5px; fill: #15803D; font-weight: 600; }
      .footer  { font-size: 11px; fill: #a8a29e; }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9A44E5"/>
    </marker>
  </defs>

  <text x="40" y="38" class="title">Activación de Agent 365 paso a paso</text>
  <text x="40" y="58" class="sub">Tres pasos secuenciales · cada uno desbloquea el siguiente</text>

  <!-- ===== Paso 1 ===== -->
  <circle cx="115" cy="200" r="38" fill="#9A44E5"/>
  <text x="115" y="210" text-anchor="middle" class="step-num">1</text>

  <rect x="180" y="120" width="240" height="200" rx="10" fill="white" stroke="#9A44E5" stroke-width="1.5"/>
  <text x="200" y="148" class="step-h">Activar Frontier (si aplica)</text>
  <text x="200" y="166" class="step-w">Solo si la organización va a usar capacidades preview</text>

  <text x="200" y="195" class="label" font-weight="600">Acción:</text>
  <text x="200" y="213" class="label">Toggle Copilot Frontier a On</text>

  <text x="200" y="240" class="label" font-weight="600">Dónde:</text>
  <text x="200" y="256" class="where">M365 admin → Copilot → Settings</text>
  <text x="200" y="270" class="where">→ User access → Copilot Frontier</text>

  <text x="200" y="295" class="check">✓ Esperar 5-10 min de propagación</text>

  <!-- Flecha 1→2 -->
  <line x1="425" y1="220" x2="490" y2="220" stroke="#9A44E5" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===== Paso 2 ===== -->
  <circle cx="540" cy="200" r="38" fill="#9A44E5"/>
  <text x="540" y="210" text-anchor="middle" class="step-num">2</text>

  <rect x="610" y="120" width="240" height="200" rx="10" fill="white" stroke="#9A44E5" stroke-width="1.5"/>
  <text x="630" y="148" class="step-h">Aceptar Terms of Service</text>
  <text x="630" y="166" class="step-w">Modal obligatorio la primera vez en el workload</text>

  <text x="630" y="195" class="label" font-weight="600">Acción:</text>
  <text x="630" y="213" class="label">Marcar y pulsar Accept</text>

  <text x="630" y="240" class="label" font-weight="600">Dónde:</text>
  <text x="630" y="256" class="where">M365 admin → Agents</text>
  <text x="630" y="270" class="where">(modal aparece automáticamente)</text>

  <text x="630" y="295" class="check">✓ Solo lo acepta Global o AI Admin</text>

  <!-- ===== Paso 3 (segunda fila, centrado) ===== -->
  <line x1="850" y1="220" x2="900" y2="220" stroke="#9A44E5" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="900" y1="220" x2="900" y2="380" stroke="#9A44E5" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="900" y1="380" x2="780" y2="380" stroke="#9A44E5" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arr)"/>

  <rect x="370" y="350" width="400" height="100" rx="10" fill="#FAF5FF" stroke="#7B2FBE" stroke-width="2"/>
  <circle cx="410" cy="400" r="28" fill="#7B2FBE"/>
  <text x="410" y="408" text-anchor="middle" class="step-num" font-size="18">3</text>

  <text x="450" y="383" class="step-h">Llegar a Agents → Overview</text>
  <text x="450" y="402" class="label">Verificar las cuatro hero metrics</text>
  <text x="450" y="418" class="label">y los cuatro elementos del menú lateral</text>
  <text x="450" y="436" class="check">✓ Activación del workload completa</text>

  <text x="490" y="500" class="footer" text-anchor="middle">Plain Vanilla Solutions — Curso Microsoft Agent 365 IT Admin · Módulo 05 · Fig. 5.2</text>
</svg>
