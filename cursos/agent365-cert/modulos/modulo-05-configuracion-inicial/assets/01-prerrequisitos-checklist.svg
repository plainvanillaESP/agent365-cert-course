<svg viewBox="0 0 980 540" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <style>
      .title  { font-size: 22px; font-weight: 700; fill: #1c1917; }
      .sub    { font-size: 13px; font-style: italic; fill: #57534e; }
      .h2     { font-size: 14px; font-weight: 600; fill: white; letter-spacing: 0.04em; }
      .item   { font-size: 13px; font-weight: 600; fill: #1c1917; }
      .desc   { font-size: 11.5px; fill: #57534e; }
      .where  { font-size: 10.5px; font-family: ui-monospace, 'SF Mono', monospace; fill: #7B2FBE; }
      .footer { font-size: 11px; fill: #a8a29e; }
    </style>
  </defs>

  <text x="40" y="38" class="title">Prerrequisitos antes de activar Agent 365</text>
  <text x="40" y="58" class="sub">Seis verificaciones · si una falla, la activación se interrumpe sin error claro</text>

  <!-- Card 1: Licencias -->
  <rect x="40" y="100" width="290" height="180" rx="10" fill="#FAF5FF" stroke="#9A44E5" stroke-width="1.5"/>
  <rect x="40" y="100" width="290" height="34" rx="10" fill="#9A44E5"/>
  <rect x="40" y="124" width="290" height="10" fill="#9A44E5"/>
  <text x="60" y="122" class="h2">1 · LICENCIAS</text>
  <text x="60" y="158" class="item">Al menos 1 licencia Agent 365</text>
  <text x="60" y="180" class="desc">Standalone $15 o E7 asignada a un usuario.</text>
  <text x="60" y="198" class="desc">Si no hay licencia, la pestaña Agents</text>
  <text x="60" y="214" class="desc">no aparece en M365 admin center.</text>
  <text x="60" y="244" class="where">M365 admin → Billing → Licenses</text>

  <!-- Card 2: Roles -->
  <rect x="350" y="100" width="290" height="180" rx="10" fill="#EFF6FF" stroke="#0284C7" stroke-width="1.5"/>
  <rect x="350" y="100" width="290" height="34" rx="10" fill="#0284C7"/>
  <rect x="350" y="124" width="290" height="10" fill="#0284C7"/>
  <text x="370" y="122" class="h2">2 · ROLES</text>
  <text x="370" y="158" class="item">Global Admin o AI Administrator</text>
  <text x="370" y="180" class="desc">El primer admin que entre tendrá que</text>
  <text x="370" y="198" class="desc">aceptar Terms of Service. Sin ese rol</text>
  <text x="370" y="214" class="desc">aparecerá &quot;You don't have permission&quot;.</text>
  <text x="370" y="244" class="where">Entra → Roles → My roles</text>

  <!-- Card 3: Audit logs -->
  <rect x="660" y="100" width="290" height="180" rx="10" fill="#F0FDF4" stroke="#15803D" stroke-width="1.5"/>
  <rect x="660" y="100" width="290" height="34" rx="10" fill="#15803D"/>
  <rect x="660" y="124" width="290" height="10" fill="#15803D"/>
  <text x="680" y="122" class="h2">3 · AUDIT LOGS</text>
  <text x="680" y="158" class="item">Habilitados antes de activar</text>
  <text x="680" y="180" class="desc">Sin audit logs, las hero metrics nunca</text>
  <text x="680" y="198" class="desc">se actualizan y Defender no recibe</text>
  <text x="680" y="214" class="desc">eventos de agentes.</text>
  <text x="680" y="244" class="where">Purview → Audit → Start recording</text>

  <!-- Card 4: Región -->
  <rect x="40" y="300" width="290" height="180" rx="10" fill="#FFF7ED" stroke="#C2410C" stroke-width="1.5"/>
  <rect x="40" y="300" width="290" height="34" rx="10" fill="#C2410C"/>
  <rect x="40" y="324" width="290" height="10" fill="#C2410C"/>
  <text x="60" y="322" class="h2">4 · REGIÓN</text>
  <text x="60" y="358" class="item">Región soportada</text>
  <text x="60" y="380" class="desc">Mayo 2026: US, EU, UK, Canadá,</text>
  <text x="60" y="398" class="desc">Australia. Otras se incorporan</text>
  <text x="60" y="414" class="desc">progresivamente.</text>
  <text x="60" y="444" class="where">M365 admin → Settings → Org profile</text>

  <!-- Card 5: Conectividad -->
  <rect x="350" y="300" width="290" height="180" rx="10" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
  <rect x="350" y="300" width="290" height="34" rx="10" fill="#DC2626"/>
  <rect x="350" y="324" width="290" height="10" fill="#DC2626"/>
  <text x="370" y="322" class="h2">5 · CONECTIVIDAD</text>
  <text x="370" y="358" class="item">Sin bloqueo de tráfico</text>
  <text x="370" y="380" class="desc">Tráfico hacia *.cloud.microsoft</text>
  <text x="370" y="398" class="desc">y *.microsoft365.com permitido</text>
  <text x="370" y="414" class="desc">en proxies y firewall corporativo.</text>
  <text x="370" y="444" class="where">Red corporativa · proxy · firewall</text>

  <!-- Card 6: Tenant ID -->
  <rect x="660" y="300" width="290" height="180" rx="10" fill="#FAFAF9" stroke="#57534E" stroke-width="1.5"/>
  <rect x="660" y="300" width="290" height="34" rx="10" fill="#57534E"/>
  <rect x="660" y="324" width="290" height="10" fill="#57534E"/>
  <text x="680" y="322" class="h2">6 · TENANT ID</text>
  <text x="680" y="358" class="item">Anotado para configuraciones</text>
  <text x="680" y="380" class="desc">Necesario para conectores cross-admin</text>
  <text x="680" y="398" class="desc">center, scripts de PowerShell y</text>
  <text x="680" y="414" class="desc">soporte de Microsoft.</text>
  <text x="680" y="444" class="where">Entra → Identity → Overview</text>

  <text x="490" y="520" class="footer" text-anchor="middle">Plain Vanilla Solutions — Curso Microsoft Agent 365 IT Admin · Módulo 05 · Fig. 5.1</text>
</svg>
