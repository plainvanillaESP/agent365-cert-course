<svg viewBox="0 0 980 580" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <style>
      .title  { font-size: 22px; font-weight: 700; fill: #1c1917; }
      .sub    { font-size: 13px; font-style: italic; fill: #57534e; }
      .step-num { font-size: 18px; font-weight: 700; fill: white; }
      .step-h { font-size: 13.5px; font-weight: 700; fill: #1c1917; }
      .desc   { font-size: 11.5px; fill: #57534e; }
      .key    { font-size: 11px; font-weight: 600; fill: #7B2FBE; }
      .footer { font-size: 11px; fill: #a8a29e; }
      .opt    { font-size: 10px; font-weight: 600; }
    </style>
    <marker id="arr-w" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9A44E5"/>
    </marker>
  </defs>

  <text x="40" y="38" class="title">Wizard de publishing · 7 pasos secuenciales</text>
  <text x="40" y="58" class="sub">Flujo guiado del admin · pasos 4 y 5 son opcionales o configurables · resto obligatorios</text>

  <!-- ===== Step 1: Submission ===== -->
  <circle cx="80" cy="130" r="22" fill="#9A44E5"/>
  <text x="80" y="137" text-anchor="middle" class="step-num">1</text>
  <rect x="115" y="100" width="200" height="62" rx="6" fill="white" stroke="#9A44E5" stroke-width="1.5"/>
  <text x="125" y="120" class="step-h">Submission</text>
  <text x="125" y="138" class="desc">Developer envía a publish.</text>
  <text x="125" y="154" class="desc">Estado: Pending approval.</text>

  <line x1="125" y1="186" x2="125" y2="208" stroke="#9A44E5" stroke-width="2" marker-end="url(#arr-w)"/>

  <!-- ===== Step 2: Review ===== -->
  <circle cx="80" cy="240" r="22" fill="#9A44E5"/>
  <text x="80" y="247" text-anchor="middle" class="step-num">2</text>
  <rect x="115" y="210" width="200" height="62" rx="6" fill="white" stroke="#9A44E5" stroke-width="1.5"/>
  <text x="125" y="230" class="step-h">Review</text>
  <text x="125" y="248" class="desc">Quién publica, qué hace,</text>
  <text x="125" y="264" class="desc">qué permisos pide.</text>

  <line x1="320" y1="240" x2="345" y2="240" stroke="#9A44E5" stroke-width="2" marker-end="url(#arr-w)"/>

  <!-- ===== Step 3: Select users ===== -->
  <circle cx="395" cy="240" r="22" fill="#9A44E5"/>
  <text x="395" y="247" text-anchor="middle" class="step-num">3</text>
  <rect x="430" y="210" width="200" height="62" rx="6" fill="white" stroke="#9A44E5" stroke-width="1.5"/>
  <text x="440" y="230" class="step-h">Select users / groups</text>
  <text x="440" y="248" class="desc">All users · Specific groups</text>
  <text x="440" y="264" class="desc">Specific users.</text>

  <line x1="635" y1="240" x2="660" y2="240" stroke="#9A44E5" stroke-width="2" marker-end="url(#arr-w)"/>

  <!-- ===== Step 4: Preinstall (optional) ===== -->
  <circle cx="710" cy="240" r="22" fill="#9A44E5"/>
  <text x="710" y="247" text-anchor="middle" class="step-num">4</text>
  <rect x="745" y="210" width="200" height="62" rx="6" fill="white" stroke="#9A44E5" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="755" y="230" class="step-h">Preinstall</text>
  <rect x="828" y="218" width="60" height="14" rx="7" fill="#FFFBEB" stroke="#F59E0B"/>
  <text x="858" y="228" text-anchor="middle" class="opt" fill="#854D0E">Opcional</text>
  <text x="755" y="248" class="desc">Auto-instalar al usuario o</text>
  <text x="755" y="264" class="desc">disponible en catálogo.</text>

  <line x1="845" y1="285" x2="845" y2="320" stroke="#9A44E5" stroke-width="2"/>
  <line x1="845" y1="320" x2="125" y2="320" stroke="#9A44E5" stroke-width="2"/>
  <line x1="125" y1="320" x2="125" y2="358" stroke="#9A44E5" stroke-width="2" marker-end="url(#arr-w)"/>

  <!-- ===== Step 5: Apply Template (decisión clave) ===== -->
  <circle cx="80" cy="390" r="22" fill="#7B2FBE"/>
  <text x="80" y="397" text-anchor="middle" class="step-num">5</text>
  <rect x="115" y="360" width="290" height="62" rx="6" fill="#FAF5FF" stroke="#7B2FBE" stroke-width="2"/>
  <text x="125" y="380" class="step-h" fill="#7B2FBE">Apply Template · DECISIÓN CLAVE</text>
  <text x="125" y="398" class="desc">Default · Custom · None</text>
  <text x="125" y="414" class="key">Marca el set de políticas que aplican al agente</text>

  <line x1="410" y1="390" x2="435" y2="390" stroke="#9A44E5" stroke-width="2" marker-end="url(#arr-w)"/>

  <!-- ===== Step 6: Permissions review ===== -->
  <circle cx="485" cy="390" r="22" fill="#9A44E5"/>
  <text x="485" y="397" text-anchor="middle" class="step-num">6</text>
  <rect x="520" y="360" width="200" height="62" rx="6" fill="white" stroke="#9A44E5" stroke-width="1.5"/>
  <text x="530" y="380" class="step-h">Permissions review</text>
  <text x="530" y="398" class="desc">Validar cada scope solicitado</text>
  <text x="530" y="414" class="desc">y otorgar admin consent.</text>

  <line x1="725" y1="390" x2="750" y2="390" stroke="#9A44E5" stroke-width="2" marker-end="url(#arr-w)"/>

  <!-- ===== Step 7: Finalización ===== -->
  <circle cx="800" cy="390" r="22" fill="#15803D"/>
  <text x="800" y="397" text-anchor="middle" class="step-num">7</text>
  <rect x="835" y="360" width="110" height="62" rx="6" fill="#F0FDF4" stroke="#15803D" stroke-width="1.5"/>
  <text x="845" y="380" class="step-h" fill="#166534">Finalización</text>
  <text x="845" y="398" class="desc">Estado: Active</text>
  <text x="845" y="414" class="desc">Notificación.</text>

  <!-- ===== Bottom panel: errores frecuentes ===== -->
  <rect x="40" y="465" width="900" height="86" rx="8" fill="#FAFAF9" stroke="#D6D3D1"/>
  <text x="60" y="488" class="step-h">Errores frecuentes</text>
  <text x="60" y="510" class="desc">Wizard se cuelga en paso 2 → información incompleta del developer · re-publish con descripción y categorización.</text>
  <text x="60" y="528" class="desc">Paso 5 sin opción Custom → no hay plantillas custom creadas · crear primero en Settings → Templates.</text>
  <text x="60" y="544" class="desc">Paso 6 «consent required» → cuenta sin Cloud Application Administrator · pedir a alguien con ese rol.</text>

  <text x="490" y="572" class="footer" text-anchor="middle">Plain Vanilla Solutions — Curso Microsoft Agent 365 IT Admin · Módulo 08 · Fig. 8.2</text>
</svg>
