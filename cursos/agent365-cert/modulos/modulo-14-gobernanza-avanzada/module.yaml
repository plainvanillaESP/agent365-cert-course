objetivos_aprendizaje:
  - id: OA-14.1
    texto: "Diferenciar las topologías multi-tenant más comunes (parent/subsidiary, M&A en curso, MSP/MSSP, joint venture) y comprender sus implicaciones específicas para gobernanza de Agent 365."
    bloom: Comprender
  - id: OA-14.2
    texto: "Configurar delegated administration cross-tenant para Agent 365 usando Microsoft Entra B2B, GDAP (Granular Delegated Admin Privileges) y customer lockbox."
    bloom: Aplicar
  - id: OA-14.3
    texto: "Diseñar políticas cross-tenant que mantengan compliance regulatoria en cada jurisdicción mientras permiten colaboración operativa cuando aplica."
    bloom: Crear
  - id: OA-14.4
    texto: "Implementar los tres federation models (centralizado, federado, hub-and-spoke) y elegir el correcto según el caso de negocio."
    bloom: Analizar
  - id: OA-14.5
    texto: "Operacionalizar el ciclo de gobernanza distribuida con comité central + comités locales y reporte agregado al órgano corporativo."
    bloom: Aplicar
glosario:
  - termino: "Tenant"
    definicion: "Instancia aislada de Microsoft 365 con su propia identidad, configuración, datos y políticas."
  - termino: "Parent / subsidiary topology"
    definicion: "Topología donde existe un tenant matriz y N tenants subsidiarios separados, típicamente por razones legales o regulatorias."
  - termino: "M&A topology"
    definicion: "Topología transitoria donde 2+ tenants coexisten durante un proceso de fusión o segregación, típicamente 12-18 meses."
  - termino: "MSP / MSSP"
    definicion: "Managed Service Provider / Managed Security Service Provider. Operador externo que gestiona Agent 365 sobre tenants de clientes."
  - termino: "Joint venture topology"
    definicion: "2 tenants matrices + 1 tenant del JV; empleados con doble cuenta en su matriz y en el JV."
  - termino: "Microsoft Entra B2B"
    definicion: "Business-to-Business collaboration: invita usuarios externos a un tenant con permisos como si fueran empleados."
  - termino: "GDAP"
    definicion: "Granular Delegated Admin Privileges. Modelo formal de delegación granular MSP-cliente con scope y duración limitados. Sustituye a DAP."
  - termino: "Customer Lockbox"
    definicion: "Mecanismo que requiere aprobación explícita del cliente por cada acceso de MSP o Microsoft a contenido empresarial."
  - termino: "Doble pertenencia controlada"
    definicion: "Patrón recomendado: cuenta primaria local + invitación B2B a matriz con roles específicos + GDAP + Customer Lockbox + audit log unificado."
  - termino: "Policy framework distribuido"
    definicion: "Modelo de gobernanza cross-tenant: comité central define principios mínimos + comités locales implementan con particularidades."
  - termino: "Federation model centralizado"
    definicion: "Modelo donde la matriz toma todas las decisiones; los locales aplican casi al pie de la letra."
  - termino: "Federation model federado"
    definicion: "Modelo donde cada local tiene autonomía completa; el central solo vela por consistencia mínima."
  - termino: "Federation model hub-and-spoke"
    definicion: "Modelo intermedio: matriz provee framework + infraestructura, locales operan dentro de ese framework. Más común en organizaciones modernas."
  - termino: "Comité central de gobernanza de IA"
    definicion: "Órgano corporativo que define framework, aprueba excepciones y reporta al Consejo. Cadencia mensual/trimestral."
  - termino: "Comité local de tenant"
    definicion: "Órgano por tenant que implementa el framework adaptado a la realidad regulatoria y cultural local."
