<svg viewBox="0 0 980 600" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <style>
      .title  { font-size: 22px; font-weight: 700; fill: #1c1917; }
      .sub    { font-size: 13px; font-style: italic; fill: #57534e; }
      .h2     { font-size: 13px; font-weight: 700; fill: white; letter-spacing: 0.04em; }
      .name   { font-size: 13.5px; font-weight: 600; fill: #1c1917; }
      .desc   { font-size: 11.5px; fill: #57534e; }
      .code   { font-size: 11px; font-family: ui-monospace, 'SF Mono', monospace; fill: #44403c; }
      .badge  { font-size: 10px; font-weight: 600; }
      .footer { font-size: 11px; fill: #a8a29e; }
    </style>
  </defs>

  <text x="40" y="38" class="title">Anatomía de un agent identity blueprint</text>
  <text x="40" y="58" class="sub">Cinco secciones · permisos heredables y restricciones son las críticas para seguridad</text>

  <!-- Outer blueprint container -->
  <rect x="40" y="90" width="900" height="450" rx="12" fill="#FAFAF9" stroke="#7B2FBE" stroke-width="2"/>
  <rect x="40" y="90" width="900" height="36" rx="12" fill="#7B2FBE"/>
  <rect x="40" y="116" width="900" height="10" fill="#7B2FBE"/>
  <text x="60" y="115" class="h2">BLUEPRINT · displayName: &quot;RRHH agents — read employee data&quot;</text>

  <!-- Section 1: Permisos heredables -->
  <rect x="60" y="145" width="430" height="180" rx="8" fill="white" stroke="#9A44E5" stroke-width="1.5"/>
  <rect x="60" y="145" width="430" height="28" rx="8" fill="#9A44E5"/>
  <rect x="60" y="167" width="430" height="6" fill="#9A44E5"/>
  <text x="75" y="164" class="h2" font-size="11">1 · INHERITABLEPERMISSIONS</text>
  <text x="75" y="190" class="name">Permisos que heredan todas las identities</text>
  <text x="75" y="209" class="code">resourceAppId: 00000003-0000-0000-c000-...</text>
  <text x="75" y="225" class="code">resourceAppName: Microsoft Graph</text>
  <text x="75" y="241" class="code">scopes:</text>
  <text x="85" y="257" class="code">- User.Read.All</text>
  <text x="85" y="273" class="code">- Group.Read.All</text>
  <text x="85" y="289" class="code">- TeamsActivity.Send</text>
  <rect x="75" y="298" width="200" height="18" rx="9" fill="#FAF5FF" stroke="#9A44E5"/>
  <text x="175" y="311" text-anchor="middle" class="badge" fill="#7B2FBE">Max 10 apps × 40 scopes</text>

  <!-- Section 2: Restrictions -->
  <rect x="510" y="145" width="430" height="180" rx="8" fill="white" stroke="#0284C7" stroke-width="1.5"/>
  <rect x="510" y="145" width="430" height="28" rx="8" fill="#0284C7"/>
  <rect x="510" y="167" width="430" height="6" fill="#0284C7"/>
  <text x="525" y="164" class="h2" font-size="11">2 · RESTRICTIONS</text>
  <text x="525" y="190" class="name">Qué pueden y qué no las identities</text>
  <text x="525" y="209" class="code">allowedAuthenticationFlows:</text>
  <text x="535" y="225" class="code">- onBehalfOf</text>
  <text x="525" y="245" class="code">maxAgentIdentities: 10</text>
  <text x="525" y="265" class="code">tenantOnly: true</text>
  <text x="525" y="285" class="code">allowedCallerApplications: []</text>
  <rect x="525" y="298" width="240" height="18" rx="9" fill="#EFF6FF" stroke="#0284C7"/>
  <text x="645" y="311" text-anchor="middle" class="badge" fill="#0369A1">Define qué autenticación permite</text>

  <!-- Section 3: Lifecycle metadata -->
  <rect x="60" y="345" width="280" height="180" rx="8" fill="white" stroke="#15803D" stroke-width="1.5"/>
  <rect x="60" y="345" width="280" height="28" rx="8" fill="#15803D"/>
  <rect x="60" y="367" width="280" height="6" fill="#15803D"/>
  <text x="75" y="364" class="h2" font-size="11">3 · LIFECYCLE</text>
  <text x="75" y="390" class="name">Caducidad y audit</text>
  <text x="75" y="410" class="code">expirationPolicy:</text>
  <text x="85" y="426" class="code">neverExpires</text>
  <text x="75" y="446" class="code">auditLevel: verbose</text>
  <text x="75" y="466" class="code">lastReviewedDateTime:</text>
  <text x="85" y="482" class="code">2026-04-15T10:00:00Z</text>

  <!-- Section 4: Custom security attributes -->
  <rect x="360" y="345" width="280" height="180" rx="8" fill="white" stroke="#C2410C" stroke-width="1.5"/>
  <rect x="360" y="345" width="280" height="28" rx="8" fill="#C2410C"/>
  <rect x="360" y="367" width="280" height="6" fill="#C2410C"/>
  <text x="375" y="364" class="h2" font-size="11">4 · CUSTOMSECURITYATTRIBUTES</text>
  <text x="375" y="390" class="name">Segmentación clave-valor</text>
  <text x="375" y="410" class="code">- key: Department</text>
  <text x="385" y="426" class="code">value: HR</text>
  <text x="375" y="446" class="code">- key: DataSensitivity</text>
  <text x="385" y="462" class="code">value: Internal</text>
  <text x="375" y="482" class="code">- key: Region</text>
  <text x="385" y="498" class="code">value: EMEA</text>

  <!-- Section 5: Identity (just header) -->
  <rect x="660" y="345" width="280" height="180" rx="8" fill="white" stroke="#57534E" stroke-width="1.5"/>
  <rect x="660" y="345" width="280" height="28" rx="8" fill="#57534E"/>
  <rect x="660" y="367" width="280" height="6" fill="#57534E"/>
  <text x="675" y="364" class="h2" font-size="11">5 · METADATOS BÁSICOS</text>
  <text x="675" y="390" class="name">Identidad del blueprint</text>
  <text x="675" y="410" class="code">id: blueprint-rrhh-001</text>
  <text x="675" y="430" class="code">displayName: ...</text>
  <text x="675" y="450" class="code">description: Agentes</text>
  <text x="685" y="466" class="code">de RRHH que leen</text>
  <text x="685" y="482" class="code">datos sin escritura</text>

  <text x="490" y="582" class="footer" text-anchor="middle">Plain Vanilla Solutions — Curso Microsoft Agent 365 IT Admin · Módulo 06 · Fig. 6.3</text>
</svg>
