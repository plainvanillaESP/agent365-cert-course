objetivos_aprendizaje:
  - id: OA-13.1
    texto: "Posicionar Copilot Control System (CCS) como panel unificado de gobernanza para Copilot 365 y agentes Agent 365 en el ecosistema Microsoft."
    bloom: Comprender
  - id: OA-13.2
    texto: "Identificar las cuatro superficies operativas de CCS: License management, Agent governance, Data governance integration y Telemetry."
    bloom: Aplicar
  - id: OA-13.3
    texto: "Configurar políticas centralizadas de adopción y restricción de agentes desde CCS (allowlist/blocklist por blueprint, por departamento, por usuario)."
    bloom: Aplicar
  - id: OA-13.4
    texto: "Diferenciar las responsabilidades de CCS (panel de control y gobernanza centralizada) respecto a Defender XDR (detección e investigación) y Purview (gobernanza del dato)."
    bloom: Analizar
  - id: OA-13.5
    texto: "Operacionalizar CCS en el día a día: reporting semanal a stakeholders, ajustes trimestrales, integración con el comité de gobernanza."
    bloom: Aplicar
glosario:
  - termino: "Copilot Control System (CCS)"
    definicion: "Panel unificado de Microsoft para gobernanza operativa de Copilot 365 y agentes Agent 365. Agrega vistas críticas de M365 admin center, Entra, Defender XDR y Purview."
  - termino: "License management"
    definicion: "Una de las 4 superficies de CCS. Vista agregada de licencias con asignación masiva, reasignación basada en uso, proyección de coste."
  - termino: "Agent governance"
    definicion: "Una de las 4 superficies de CCS. Catálogo de agentes con allowlist/blocklist por blueprint, departamento o usuario."
  - termino: "Data governance integration"
    definicion: "Una de las 4 superficies de CCS. Vista agregada de policies de Purview con redirección al portal nativo para edición fina."
  - termino: "Telemetry"
    definicion: "Una de las 4 superficies de CCS. Métricas de adopción con drill-down anonimizado."
  - termino: "Open catalog"
    definicion: "Modelo de política donde todos los agentes son disponibles para todos los usuarios con licencia."
  - termino: "Curated catalog"
    definicion: "Modelo de política donde solo agentes explícitamente permitidos están disponibles, por departamento. Caso operativo más común."
  - termino: "Approval-based"
    definicion: "Modelo de política donde cualquier acceso a un agente nuevo requiere ticket de aprobación. Para organizaciones reguladas o fases iniciales."
  - termino: "Compliance rate (CCS)"
    definicion: "KPI: % de invocaciones dentro de la política vs intentos bloqueados."
  - termino: "DAU / MAU"
    definicion: "Daily Active Users / Monthly Active Users. KPIs canónicos de adopción reportados en Telemetry."
  - termino: "Pending approvals"
    definicion: "Tickets de aprobación de acceso a agentes pendientes de resolución. Threshold operativo: < 72h."
  - termino: "Anti-patrón 'hacer todo desde CCS'"
    definicion: "Error operacional: pretender que CCS sustituya a Defender XDR/Purview para acciones forenses o configuración fina."
