<svg viewBox="0 0 980 580" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <style>
      .title  { font-size: 22px; font-weight: 700; fill: #1c1917; }
      .sub    { font-size: 13px; font-style: italic; fill: #57534e; }
      .h2     { font-size: 12.5px; font-weight: 700; fill: white; letter-spacing: 0.04em; }
      .metric-num { font-size: 32px; font-weight: 700; fill: #1c1917; }
      .metric-label { font-size: 11.5px; fill: #57534e; font-weight: 600; }
      .metric-trend { font-size: 10.5px; fill: #15803D; }
      .action-h { font-size: 13px; font-weight: 700; fill: #1c1917; }
      .action-num { font-size: 22px; font-weight: 700; }
      .action-desc { font-size: 11px; fill: #57534e; }
      .footer { font-size: 11px; fill: #a8a29e; }
    </style>
  </defs>

  <text x="40" y="38" class="title">Overview · hero metrics + top actions for you</text>
  <text x="40" y="58" class="sub">Cuatro KPIs grandes arriba · cuatro categorías de acciones recomendadas abajo · centro de mando diario</text>

  <!-- ===== Hero metrics row ===== -->
  <text x="40" y="95" class="h2" fill="#7B2FBE">HERO METRICS</text>
  <line x1="40" y1="100" x2="940" y2="100" stroke="#E7E5E4"/>

  <!-- Metric 1: Registry total -->
  <rect x="40" y="115" width="218" height="120" rx="10" fill="white" stroke="#9A44E5" stroke-width="1.5"/>
  <text x="58" y="138" class="metric-label">AGENT REGISTRY TOTAL</text>
  <text x="58" y="180" class="metric-num">247</text>
  <text x="58" y="205" class="metric-trend">▲ +14 últimos 30 días</text>
  <!-- Mini sparkline -->
  <polyline points="58,225 90,222 122,218 154,215 186,210 220,208 240,205" fill="none" stroke="#9A44E5" stroke-width="1.5"/>

  <!-- Metric 2: Active users -->
  <rect x="266" y="115" width="218" height="120" rx="10" fill="white" stroke="#9A44E5" stroke-width="1.5"/>
  <text x="284" y="138" class="metric-label">ACTIVE USERS · 30 DÍAS</text>
  <text x="284" y="180" class="metric-num">1.842</text>
  <text x="284" y="205" class="metric-trend">▲ +12 % mom</text>
  <polyline points="284,228 316,225 348,223 380,220 412,215 446,210 466,205" fill="none" stroke="#9A44E5" stroke-width="1.5"/>

  <!-- Metric 3: Run-time -->
  <rect x="492" y="115" width="218" height="120" rx="10" fill="white" stroke="#9A44E5" stroke-width="1.5"/>
  <text x="510" y="138" class="metric-label">AGENT RUN-TIME</text>
  <text x="510" y="180" class="metric-num">8.3<tspan font-size="20" fill="#57534e">k h</tspan></text>
  <text x="510" y="205" class="metric-trend">▲ +9 % mom</text>
  <polyline points="510,225 542,224 574,222 606,219 638,217 672,210 692,208" fill="none" stroke="#9A44E5" stroke-width="1.5"/>

  <!-- Metric 4: Registry sync -->
  <rect x="718" y="115" width="222" height="120" rx="10" fill="white" stroke="#9A44E5" stroke-width="1.5"/>
  <text x="736" y="138" class="metric-label">REGISTRY SYNC</text>
  <text x="736" y="178" class="metric-num" font-size="20">✓ healthy</text>
  <text x="736" y="200" class="action-desc">2 plataformas conectadas</text>
  <text x="736" y="216" class="action-desc">última sync: hace 12 min</text>
  <text x="736" y="232" class="action-desc" font-style="italic">M365 + Bedrock (preview)</text>

  <!-- ===== Top actions ===== -->
  <text x="40" y="275" class="h2" fill="#C2410C">TOP ACTIONS FOR YOU</text>
  <line x1="40" y1="280" x2="940" y2="280" stroke="#E7E5E4"/>

  <!-- Action 1: Pending requests -->
  <rect x="40" y="295" width="218" height="220" rx="10" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <rect x="40" y="295" width="218" height="32" rx="10" fill="#F59E0B"/>
  <rect x="40" y="319" width="218" height="8" fill="#F59E0B"/>
  <text x="58" y="316" class="h2">1 · PENDING REQUESTS</text>

  <text x="58" y="365" class="action-num" fill="#854D0E">7</text>
  <text x="58" y="395" class="action-h">Esperando aprobación</text>
  <text x="58" y="418" class="action-desc">Agentes Third Party del catálogo</text>
  <text x="58" y="434" class="action-desc">público que necesitan revisión</text>
  <text x="58" y="450" class="action-desc">antes de operar.</text>

  <text x="58" y="478" class="action-desc" font-weight="600" fill="#854D0E">→ Revisar y aprobar</text>
  <text x="58" y="494" class="action-desc" font-style="italic">o rechazar uno a uno</text>

  <!-- Action 2: Agents at risk -->
  <rect x="266" y="295" width="218" height="220" rx="10" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
  <rect x="266" y="295" width="218" height="32" rx="10" fill="#DC2626"/>
  <rect x="266" y="319" width="218" height="8" fill="#DC2626"/>
  <text x="284" y="316" class="h2">2 · AGENTS AT RISK</text>

  <text x="284" y="365" class="action-num" fill="#B91C1C">3</text>
  <text x="284" y="395" class="action-h">High o Critical</text>
  <text x="284" y="418" class="action-desc">Detecciones de Identity Protection,</text>
  <text x="284" y="434" class="action-desc">Defender o anomalías de</text>
  <text x="284" y="450" class="action-desc">comportamiento.</text>

  <text x="284" y="478" class="action-desc" font-weight="600" fill="#B91C1C">→ Investigar uno a uno</text>
  <text x="284" y="494" class="action-desc" font-style="italic">¿falso positivo o real?</text>

  <!-- Action 3: Ownerless -->
  <rect x="492" y="295" width="218" height="220" rx="10" fill="#FFF7ED" stroke="#C2410C" stroke-width="1.5"/>
  <rect x="492" y="295" width="218" height="32" rx="10" fill="#C2410C"/>
  <rect x="492" y="319" width="218" height="8" fill="#C2410C"/>
  <text x="510" y="316" class="h2">3 · OWNERLESS AGENTS</text>

  <text x="510" y="365" class="action-num" fill="#9A3412">5</text>
  <text x="510" y="395" class="action-h">Sin owner asignado</text>
  <text x="510" y="418" class="action-desc">Owner eliminado del directorio o</text>
  <text x="510" y="434" class="action-desc">nunca asignado. Indicador típico</text>
  <text x="510" y="450" class="action-desc">de governance débil.</text>

  <text x="510" y="478" class="action-desc" font-weight="600" fill="#9A3412">→ Asignar nuevo owner</text>
  <text x="510" y="494" class="action-desc" font-style="italic">o deprecar si no se usa</text>

  <!-- Action 4: With exceptions -->
  <rect x="718" y="295" width="222" height="220" rx="10" fill="#EFF6FF" stroke="#0284C7" stroke-width="1.5"/>
  <rect x="718" y="295" width="222" height="32" rx="10" fill="#0284C7"/>
  <rect x="718" y="319" width="222" height="8" fill="#0284C7"/>
  <text x="736" y="316" class="h2">4 · WITH EXCEPTIONS</text>

  <text x="736" y="365" class="action-num" fill="#0369A1">12</text>
  <text x="736" y="395" class="action-h">Con excepciones a políticas</text>
  <text x="736" y="418" class="action-desc">Excepciones legítimas aplicadas a</text>
  <text x="736" y="434" class="action-desc">Conditional Access, DLP u otras.</text>
  <text x="736" y="450" class="action-desc">Deben revisarse periódicamente.</text>

  <text x="736" y="478" class="action-desc" font-weight="600" fill="#0369A1">→ Revisar si siguen</text>
  <text x="736" y="494" class="action-desc" font-style="italic">siendo necesarias</text>

  <text x="490" y="568" class="footer" text-anchor="middle">Plain Vanilla Solutions — Curso Microsoft Agent 365 IT Admin · Módulo 07 · Fig. 7.3</text>
</svg>
